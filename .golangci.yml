version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive
    - bodyclose
    - unconvert
  settings:
    staticcheck:
      checks: ["all"]
    revive:
      rules:
        - name: exported
          arguments: ["disableStutteringCheck"]
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
    - goimports
